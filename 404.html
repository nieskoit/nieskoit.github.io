<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <title>404 | Kraina Twórców</title>
    
    <meta name="theme-color" content="#76c63f">
    <link rel="icon" type="image/png" sizes="96x96" href="https://www.krainatworcow.pl/img/kt.png">
    <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>
    
    <div id="loader">
        <img src="img/ktbt.png" alt="Logo" class="loader-logo">
        <div class="loader-bar"></div>
    </div>

    <noscript>
        <style>
            #loader { 
                display: none !important; 
                visibility: hidden !important; 
            }
        </style>
    </noscript>

    <header class="header">
        <div class="logo-area">
            <a href="/"><img src="img/ktbt.webp" alt="Logo"></a>
        </div>
    </header>

    <main class="container error-container">
        <div class="panel error-panel-box">
            
            <div class="error-id">404</div>
            <div class="error-subtitle">Strona nieodnaleziona</div>
            
            <h2>Zgubiłeś ścieżkę?</h2>
            <p class="error-description">Miejsce, którego szukasz, zostało pochłonięte przez mgłę lub nigdy nie istniało w tym zakątku Krainy.</p>

            <a href="/" class="btn-primary">
                Wróć na start
            </a>
        </div>
    </main>

    <footer>
        <p>Projekt nie jest powiązany z firmą Mojang AB.</p>
    </footer>

    <script src="js/loader.js" defer></script>
</body>
</html>
